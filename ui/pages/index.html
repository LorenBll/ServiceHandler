        function apiCall(url, data, onSuccess, onError) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    if (onSuccess) onSuccess();
                } else {
                    if (onError) onError(xhr.status, xhr.responseText);
                }
            };
            xhr.onerror = function() { if (onError) onError(0, 'Network error'); };
            xhr.ontimeout = function() { if (onError) onError(0, 'Timeout'); };
            xhr.send(JSON.stringify(data));
        }

        function reconcileCards(clients) {
            currentClients = clients;
            if (groupByKey) {
                buildCards(clients, false);
                return;
            }
            var content = document.getElementById('content');
            var brokenHashes = {};
            brokenClients.forEach(function(bc) { brokenHashes[bc.hash] = true; });
            var clientHashMap = {};
            clients.forEach(function(c) { clientHashMap[c.hash] = c; });
            var stale = [];
            var existingCards = Array.from(content.querySelectorAll('.service-card'));
            existingCards.forEach(function(c) {
                var h = c.getAttribute('data-hash');
                if (forgottenHashes[h] || (!clientHashMap[h] && !brokenHashes[h])) stale.push(c);
            });
            stale.forEach(function(c) { c.remove(); });
            existingCards = Array.from(content.querySelectorAll('.service-card'));
            var existingHashes = {};
            existingCards.forEach(function(c) { existingHashes[c.getAttribute('data-hash')] = c; });

            // Build sorted list of all clients to determine insertion positions
            var sortedAll = clients.slice();
            sortClients(sortedAll);

            var hit = false;
            clients.forEach(function(c) {
                if (!existingHashes[c.hash] && !brokenHashes[c.hash] && !forgottenHashes[c.hash]) {
                    var cardDiv = document.createElement('div');
                    var isAsker = apiAskerHashes[c.hash] || false;
                    cardDiv.innerHTML = cardHTML(c.name, c.port, c.pid || '', true, c.bind_address, c.hostname, c.starting_script, isAsker, c.hash);
                    var card = cardDiv.firstElementChild;
                    card.setAttribute('data-hash', c.hash || '');
                    card.setAttribute('data-port', c.port || '');
                    card.setAttribute('data-starting-script', c.starting_script || '');
                    card.setAttribute('data-pid', c.pid !== undefined && c.pid !== '' ? String(c.pid) : '');
                    card.setAttribute('data-new', '1');

                    // Find insertion index in sorted list
                    var idx = -1;
                    for (var si = 0; si < sortedAll.length; si++) {
                        if (sortedAll[si].hash === c.hash) { idx = si; break; }
                    }
                    // Find which existing card this new card should go before
                    var insertBefore = null;
                    for (var si = idx + 1; si < sortedAll.length; si++) {
                        var afterHash = sortedAll[si].hash;
                        if (existingHashes[afterHash]) {
                            insertBefore = existingHashes[afterHash];
                            break;
                        }
                    }
                    if (insertBefore) {
                        content.insertBefore(card, insertBefore);
                    } else {
                        content.appendChild(card);
                    }

                    card.removeAttribute('data-new');

                    // Update references for next new card
                    existingCards = Array.from(content.querySelectorAll('.service-card'));
                    existingCards = existingCards.filter(function(ec) { return ec.getAttribute('data-new') !== '1' || ec === card; });
                    existingHashes[card.getAttribute('data-hash')] = card;

                    hit = true;
                }
            });
            updateVisibility(content.querySelectorAll('.service-card').length);
            _syncCheckboxUI();
        }

        function updateVisibility(totalCount, visibleCount, firstLoad) {
            if (visibleCount === undefined) visibleCount = totalCount;
            refreshPageVisibility(totalCount, visibleCount, !!firstLoad);
            document.querySelectorAll('#pill .pill-item').forEach(function(pi) {
                if (pi.querySelector('.pill-label').textContent === 'registered clients') {
                    pi.querySelector('.pill-value').textContent = String(totalCount);
                }
            });
        }

        function addBrokenClient(c) {
            var hash = c.hash || '';
            if (!hash || forgottenHashes[hash]) return;
            for (var i = 0; i < brokenClients.length; i++) {
                if (brokenClients[i].hash === hash) return;
            }
            brokenClients.push(c);
            if (apiAskerHashes[hash]) {
                delete apiAskerHashes[hash];
                var card = document.querySelector('.service-card[data-hash="' + hash + '"]');
                if (card) {
                    card.classList.remove('service-card-api-asker');
                    var akb = card.querySelector('.card-api-key-buttons');
                    if (akb) akb.remove();
                }
            }
            updateBrokenButtons();
        }

        function removeBrokenClient(hash) {
            var newList = [];
            for (var i = 0; i < brokenClients.length; i++) {
                if (brokenClients[i].hash !== hash) newList.push(brokenClients[i]);
            }
            brokenClients = newList;
            delete forgottenHashes[hash];
            updateBrokenButtons();
        }

        function repositionCard(card) {
            var hash = card.getAttribute('data-hash');
            if (!hash) return;
            var content = document.getElementById('content');
            if (content.querySelector('.group-section')) return;
            var allCards = Array.from(content.querySelectorAll('.service-card'));
            var allClients = [];
            allCards.forEach(function(c) {
                var h = c.getAttribute('data-hash');
                for (var i = 0; i < currentClients.length; i++) {
                    if (currentClients[i].hash === h) { allClients.push(currentClients[i]); return; }
                }
                for (var i = 0; i < brokenClients.length; i++) {
                    if (brokenClients[i].hash === h) { allClients.push(brokenClients[i]); return; }
                }
            });
            sortClients(allClients);
            var idx = -1;
            for (var i = 0; i < allClients.length; i++) {
                if (allClients[i].hash === hash) { idx = i; break; }
            }
            if (idx < 0) return;
            var insertBefore = null;
            for (var i = idx + 1; i < allClients.length; i++) {
                var next = content.querySelector('.service-card[data-hash="' + allClients[i].hash + '"]');
                if (next && next !== card) { insertBefore = next; break; }
            }
            var parent = card.parentNode;
            if (insertBefore) {
                if (card.nextElementSibling !== insertBefore) {
                    card.remove();
                    parent.insertBefore(card, insertBefore);
                }
            } else {
                var lastCard = parent.querySelector('.service-card:last-child');
                if (card !== lastCard) {
                    card.remove();
                    parent.appendChild(card);
                }
            }
        }

        function applyHealthUpdates(unhealthyClients) {
            var changed = false;
            var unhealthyHashes = {};
            if (unhealthyClients) {
                unhealthyClients.forEach(function(u) {
                    unhealthyHashes[u.hash] = true;
                    if (!brokenClients.some(function(bc) { return bc.hash === u.hash; })) {
                        changed = true;
                        addBrokenClient(u);
                    }
                    var card = document.querySelector('.service-card[data-hash="' + u.hash + '"]');
                    if (card) {
                        var wasBroken = card.classList.contains('service-card-unhealthy');
                        if (!wasBroken) changed = true;
                        card.classList.add('service-card-unhealthy');
                        updateCardButtonLabels(card);
                        repositionCard(card);
                    }
                });
            }
            brokenClients.slice().forEach(function(bc) {
                if (!unhealthyHashes[bc.hash]) {
                    var card = document.querySelector('.service-card[data-hash="' + bc.hash + '"]');
                    if (card) {
                        changed = true;
                        card.classList.remove('service-card-unhealthy');
                        removeBrokenClient(bc.hash);
                        updateCardButtonLabels(card);
                        repositionCard(card);
                    } else {
                        changed = true;
                        removeBrokenClient(bc.hash);
                    }
                }
            });
            if (changed) {
                refreshPills();
                filterCards();
                _buildSearchIndex();
            }
        }

        function updateBrokenButtons() {
            refreshPageVisibility(document.querySelectorAll('.service-card').length, document.querySelectorAll('.service-card:not([style*="display: none"])').length, false);
            var forgetBtn = document.querySelector('.broken-forget-btn');
            var restartBtn = document.querySelector('.broken-restart-btn');
            var protectedBrokenExists = brokenClients.some(function(bc) { return bc.protected; });
            if (forgetBtn) forgetBtn.disabled = protectedBrokenExists;
            if (restartBtn) {
                var canRestartAny = brokenClients.some(function(bc) { return bc.starting_script; });
                restartBtn.disabled = !canRestartAny || protectedBrokenExists;
            }
        }

            items.push({ el: document.getElementById('searchBar'), delay: 0.3 });
            items.push({ el: document.getElementById('sortItemsCasing'), delay: 0.3 });

            var emptyState = document.querySelector('.empty-state');
            if (emptyState) items.push({ el: emptyState, delay: 0.3 });

            document.querySelectorAll('.group-header').forEach(function(h) {
                items.push({ el: h, delay: 0.3 });
            });

            var groupSections = document.querySelectorAll('.group-section');
            if (groupSections.length > 0) {
                groupSections.forEach(function(section) {
                    var cards = section.querySelectorAll('.service-card');
                    cards.forEach(function(card, i) {
                        items.push({ el: card, delay: 0.45 + i * 0.15 });
                    });
                });
            } else {
                var cards = document.querySelectorAll('.service-card');
                cards.forEach(function(card, i) {
                    items.push({ el: card, delay: 0.3 + i * 0.15 });
                });
            }

            requestAnimationFrame(function() {
                items.forEach(function(item) {
                    if (!item.el) return;
                    if (item.el.classList.contains('hidden')) return;
                    if (item.el.style.display === 'none') return;
                    if (!item.el.offsetParent) return;
                    item.el.style.animationDelay = item.delay + 's';
                    item.el.classList.remove('init-hidden');
                    item.el.classList.add('load-in');
                    item.el.addEventListener('animationend', function() {
                        this.classList.remove('load-in');
                        this.style.animationDelay = '';
                    }, { once: true });
                });
            });
        }

        function apiKeyAction(btn, hash, action) {
            var origHTML = btn.innerHTML;
            btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto"></div>';
            btn.disabled = true;
            var url = action === 'grant' ? '/api/api-key/grant' : '/api/api-key/reject';
            var card = document.querySelector('.service-card[data-hash="' + hash + '"]');
            var akb = card ? card.querySelector('.card-api-key-buttons') : null;
            var finished = false;
            function restore() {
                if (finished) return;
                finished = true;
                btn.innerHTML = origHTML;
                btn.disabled = false;
            }
            function finish() {
                if (finished) return;
                finished = true;
                if (akb) akb.remove();
                if (card) card.classList.remove('service-card-api-asker');
                delete apiAskerHashes[hash];
                if (card) {
                    var empty = card.querySelector('.expand-empty');
                    if (empty) empty.classList.add('expand-empty-drop');
                }
            }
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    if (akb) {
                        akb.classList.add('api-key-fade-out');
                        akb.addEventListener('animationend', finish, { once: true });
                        setTimeout(finish, 600);
                    } else {
                        finish();
                    }
                } else {
                    restore();
                    var err = document.getElementById('content');
                    if (err) {
                        var el = document.createElement('div');
                        el.className = 'empty-state';
                        el.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#dc2626;z-index:20;background:rgba(255,255,255,0.85)';
                        el.textContent = 'Action failed (HTTP ' + xhr.status + ')';
                        err.appendChild(el);
                        setTimeout(function() { el.remove(); }, 3000);
                    }
                }
            };
            xhr.onerror = function() {
                restore();
                var err = document.getElementById('content');
                if (err) {
                    var el = document.createElement('div');
                    el.className = 'empty-state';
                    el.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#dc2626;z-index:20;background:rgba(255,255,255,0.85)';
                    el.textContent = 'Network error';
                    err.appendChild(el);
                    setTimeout(function() { el.remove(); }, 3000);
                }
            };
            xhr.send(JSON.stringify({hash: hash}));
        }

        function refreshPendingApiKeyHashes() {
            return fetch('/api/api-key/pending')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var newHashes = {};
                    if (d.hashes) {
                        d.hashes.forEach(function(h) { newHashes[h] = true; });
                    }
                    var changed = false;
                    for (var h in apiAskerHashes) { if (!newHashes[h]) { changed = true; break; } }
                    if (!changed) { for (var h in newHashes) { if (!apiAskerHashes[h]) { changed = true; break; } } }
                    apiAskerHashes = newHashes;
                    if (changed) {
                        var allCards = document.querySelectorAll('.service-card');
                        allCards.forEach(function(c) {
                            if (c.querySelector('.card-api-key-buttons.api-key-fade-out')) return;
                            var h = c.getAttribute('data-hash');
                            var isAsker = !!apiAskerHashes[h];
                            c.classList.toggle('service-card-api-asker', isAsker);
                            var existingBtns = c.querySelector('.card-api-key-buttons');
                            if (isAsker && !existingBtns) {
                                var wrapper = document.createElement('div');
                                wrapper.innerHTML =
                                  '<div class="card-api-key-buttons">' +
                                  '<button class="card-btn card-btn-green card-btn-grant">Grant API Key Registration</button>' +
                                  '<button class="card-btn card-btn-gray card-btn-reject">Reject API Key Registration</button>' +
                                  '</div>';
                                var btns = wrapper.firstElementChild;
                                var cardButtons = c.querySelector('.card-buttons');
                                if (cardButtons) cardButtons.insertBefore(btns, cardButtons.firstChild);
                            } else if (!isAsker && existingBtns) {
                                existingBtns.remove();
                            }
                        });
                    }
                })
                .catch(function() {});
        }

        document.getElementById('content').addEventListener('click', function(e) {
            function afterTerminate(terminatedHash) {
                return function() {
                    fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                        enrichClientsWithHashes(d.clients).then(function(clients) {
                            buildCards(clients.filter(function(c) { return c.hash !== terminatedHash; }), false);
                        });
                    }).catch(function() {});
                };
            }
            function handleActionBtn(card, data, apiPath, onDone) {
                var content = document.getElementById('content');
                function cleanup(status, text) {
                    var loader = content.querySelector('.content-loader');
                    if (loader) loader.remove();
                    if (status && status !== 200) {
                        var err = document.createElement('div');
                        err.className = 'empty-state';
                        err.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#dc2626;z-index:20;background:rgba(255,255,255,0.85)';
                        err.textContent = 'Action failed (HTTP ' + status + ')';
                        content.appendChild(err);
                        setTimeout(function() { err.remove(); }, 3000);
                    }
                }
                if (card.classList.contains('expanded')) {
                    collapseExpandedCard(card, content, false, function() {
                        card.remove();
                        var loader = document.createElement('div');
                        loader.className = 'content-loader';
                        loader.innerHTML = '<div class="spinner"></div>';
                        content.appendChild(loader);
                        apiCall(apiPath, data, onDone, cleanup);
                    });
                } else {
                    var loader = document.createElement('div');
                    loader.className = 'content-loader';
                    loader.innerHTML = '<div class="spinner"></div>';
                    content.appendChild(loader);
                    apiCall(apiPath, data, onDone, cleanup);

            var cardCount = document.querySelectorAll('.service-card:not([style*="display: none"])').length;
            var checkboxEl = e.target.closest('.card-checkbox');
            if (checkboxEl) {

                e.stopPropagation();
                var hash = checkboxEl.getAttribute('data-card-hash');
                if (hash) {
                    _selectedCardHashes[hash] = !_selectedCardHashes[hash];
                    if (!_selectedCardHashes[hash]) delete _selectedCardHashes[hash];
                }
                _checkboxVisible = true;
                _syncCheckboxUI();
                return;
            }

            var grantBtn = e.target.closest('.card-btn-grant');
            if (grantBtn) {
                var card = grantBtn.closest('.service-card');
                if (!card) return;
                var gHash = card.getAttribute('data-hash');
                if (gHash) apiKeyAction(grantBtn, gHash, 'grant');

            if (rejectBtn) {
                var card = rejectBtn.closest('.service-card');
                if (!card) return;
                var rHash = card.getAttribute('data-hash');
                if (rHash) apiKeyAction(rejectBtn, rHash, 'reject');
                return;
            }
            var redBtn = e.target.closest('.card-btn-red');
            if (redBtn) {
                var card = redBtn.closest('.service-card');
                if (!card) return;
                if (card.getAttribute('data-protected') === 'true') return;
                var termHash = card.getAttribute('data-hash');
                var termPid = card.getAttribute('data-pid');
                if (termHash) forgottenHashes[termHash] = true;
                var isBroken = card.classList.contains('service-card-unhealthy');
                handleActionBtn(card, {
                    hash: termHash,
                    pid: termPid || undefined
                }, isBroken ? '/api/broken/forget' : '/api/service/terminate', afterTerminate(termHash));
                return;
            }
            var yellowBtn = e.target.closest('.card-btn-yellow');
            if (yellowBtn) {
                if (yellowBtn.disabled) return;
                var card = yellowBtn.closest('.service-card');
                if (!card) return;
                if (card.getAttribute('data-protected') === 'true') return;
                var hash = card.getAttribute('data-hash');
                if (hash) forgottenHashes[hash] = true;
                brokenClients = brokenClients.filter(function(bc) { return bc.hash !== hash; });
                updateBrokenButtons();
                var isBroken = card.classList.contains('service-card-unhealthy');
                handleActionBtn(card, {
                    hash: hash
                }, isBroken ? '/api/broken/restart' : '/api/service/restart', afterTerminate(hash));
                return;
            }
            var shieldBtn = e.target.closest('.card-btn-shield');
            if (shieldBtn) {
                var card = shieldBtn.closest('.service-card');
                if (!card) return;
                var hash = card.getAttribute('data-hash');
                if (!hash) return;
                var currentlyProtected = card.getAttribute('data-protected') === 'true';
                var apiPath = currentlyProtected ? '/api/service/unprotect' : '/api/service/protect';
                var xhr = new XMLHttpRequest();
                xhr.open('POST', apiPath, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (xhr.status === 200) {
                        var newProtected = !currentlyProtected;
                        card.setAttribute('data-protected', newProtected ? 'true' : 'false');
                        card.classList.toggle('service-card-protected', newProtected);
                        shieldBtn.classList.toggle('protected', newProtected);
                        shieldBtn.setAttribute('data-label', newProtected ? 'Unprotect Service' : 'Protect Service');
                        card.querySelectorAll('.card-btn-red, .card-btn-yellow').forEach(function(b) {
                            b.disabled = newProtected;
                        });
                        var idx = currentClients.findIndex(function(c) { return c.hash === hash; });
                        if (idx >= 0) currentClients[idx].protected = newProtected;
                        var brokenIdx = brokenClients.findIndex(function(c) { return c.hash === hash; });
                        if (brokenIdx >= 0) brokenClients[brokenIdx].protected = newProtected;
                        if (card.classList.contains('expanded')) {
                            filterCards();
                            var poll = setInterval(function() {
                                if (!document.body.contains(card) || !card.classList.contains('expanded')) {
                                    clearInterval(poll);
                                    buildCards(currentClients, false);
                                }
                            }, 50);
                        } else {
                            filterCards();
                            buildCards(currentClients, false);
                        }
                    }
                };
                xhr.send(JSON.stringify({hash: hash}));
                return;
            }
            var btn = e.target.closest('.card-btn-blue');
            if (!btn) {
                var clickedCard = e.target.closest('.service-card');
                if (clickedCard && cardCount > 1 && !clickedCard.classList.contains('expanded')) {
                    var h = clickedCard.getAttribute('data-hash');
                    if (h) {
                        _selectedCardHashes[h] = !_selectedCardHashes[h];
                        if (!_selectedCardHashes[h]) delete _selectedCardHashes[h];
                        _checkboxVisible = true;
                        _syncCheckboxUI();
                    }
                }
                return;
            }
            var card = btn.closest('.service-card');
            if (!card) return;
            if (document.body.classList.contains('expanding') || document.body.classList.contains('collapsing')) return;
            if (_expandTimeout) return;
            var content = this;
            var isExpanding = !card.classList.contains('expanded');
            if (isExpanding) {
                if (_expandTimeout) {
                    clearTimeout(_expandTimeout);
                    _expandTimeout = null;
                    var prevExpanding = content.querySelector('.service-card.expanding');
                    if (prevExpanding) prevExpanding.classList.remove('expanding');
                    document.body.classList.remove('expanding');
                }
                var prev = content.querySelector('.service-card.expanded');
                if (prev) collapseExpandedCard(prev, content, true);
                card.classList.add('expanding');
                document.body.classList.add('expanding');
                _clearCheckboxSelection();
                document.getElementById('healthButton').querySelector('.health-decoration').setAttribute('data-label', 'Check Service Health');
                _expandTimeout = setTimeout(function() {
                    _expandTimeout = null;
                    var contentRect = content.getBoundingClientRect();
                    var cardRect = card.getBoundingClientRect();
                    var relTop = cardRect.top - contentRect.top;
                    var relLeft = cardRect.left - contentRect.left;
                    var parentNode = card.parentNode;
                    var allCards = parentNode.querySelectorAll('.service-card');
                    var cardIndex = Array.prototype.indexOf.call(allCards, card);
                    var col = (cardIndex % 3) + 1;
                    var row = Math.floor(cardIndex / 3) + 1;
                    var section = parentNode.classList.contains('group-section') ? parentNode : null;
                    if (section) row += 1;
                    if (section) {
                        section.style.height = section.getBoundingClientRect().height + 'px';
                    }
                    content.style.height = contentRect.height + 'px';
                    content.classList.add('expanded');
                document.getElementById('searchInput').disabled = true;
                    var placeholder = document.createElement('div');
                    placeholder.className = 'expand-placeholder';
                    placeholder.style.gridRow = row + ' / ' + (row + 1);
                    placeholder.style.gridColumn = col + ' / ' + (col + 1);
                    placeholder.style.visibility = 'hidden';
                    placeholder.style.pointerEvents = 'none';
                    placeholder.style.justifySelf = 'start';
                    placeholder.style.width = cardRect.width + 'px';
                    placeholder.style.minHeight = cardRect.height + 'px';
                    card.parentNode.insertBefore(placeholder, card);
                    var self = card;
                    self.classList.add('expanded');
                    self.style.top = relTop + 'px';
                    self.style.left = relLeft + 'px';
                    self.style.width = cardRect.width + 'px';
                    self.style.height = cardRect.height + 'px';
                    void self.offsetWidth;
                    self.style.top = '0';
                    self.style.left = '0';
                    self.style.width = '100%';
                    setTimeout(function() {
                        if (!self.parentNode || !self.classList.contains('expanded')) return;
                        self.style.height = '100%';
                        setTimeout(function() {
                            if (!self.parentNode || !self.classList.contains('expanded')) return;
                            document.getElementById('sidebar').classList.add('hidden');
                            var sb = document.getElementById('searchBar');
                            sb.classList.add('hidden');
                            self.classList.add('expanded-active', 'expanded-buttons');
                            if (btn) btn.setAttribute('data-label', 'Collapse');
                            updateBrokenButtons();
                            document.body.classList.remove('expanding');
                            var cardPort = card.getAttribute('data-port');
                            var cardName = card.querySelector('.card-name').textContent;
                            if (cardPort) {
                                var healthData = null;
                                var endpointsData = null;
                                var healthErr = null;
                                var endpointsErr = null;

                                function tryPopulate() {
                                    if (healthData !== null && endpointsData !== null) {
                                        populateExpandedContent(card, healthData, endpointsData);
                                     } else if (healthErr && endpointsData !== null) {
                                        var container = card.querySelector('.card-expanded-content');
                                        if (container) {
                                            container.innerHTML = '';
                                            var epHtml = '';
                                            if (endpointsData.length) {
                                                epHtml += '<div class="expand-endpoints-section">';
                                                endpointsData.forEach(function(ep) {
                                                    epHtml += buildEndpointCard(ep);
                                                });
                                                epHtml += '</div>';
                                            }
                                            container.innerHTML = '<div class="expand-empty expand-error">' + cardName + ' Health Fetch Failed</div>' + epHtml;
                                            card.classList.add('service-card-unhealthy');
                                            updateCardButtonLabels(card);
                                            var chash = card.getAttribute('data-hash');
                                            if (chash) {
                                                var cmetaVals = card.querySelectorAll('.card-meta-value');
                                                addBrokenClient({
                                                    hash: chash,
                                                    name: cardName,
                                                    port: card.getAttribute('data-port'),
                                                    starting_script: card.getAttribute('data-starting-script'),
                                                    bind_address: cmetaVals[0] ? cmetaVals[0].textContent : '',
                                                    hostname: cmetaVals[1] ? cmetaVals[1].textContent : '',
                                                    protected: card.getAttribute('data-protected') === 'true'
                                                });
                                            }
                                        }
                                    } else if (healthErr && endpointsErr) {
                                        showExpandError(card, cardName);
                                    }
                                }

                                var hxhr = new XMLHttpRequest();
                                hxhr.open('GET', 'http://127.0.0.1:' + cardPort + '/api/health', true);
                                hxhr.timeout = 3000;
                                hxhr.onload = function() {
                                    if (hxhr.status === 200) {
                                        try { healthData = JSON.parse(hxhr.responseText); } catch(e) { healthErr = e; }
                                    } else { healthErr = true; }
                                    tryPopulate();
                                };
                                hxhr.onerror = function() { healthErr = true; tryPopulate(); };
                                hxhr.ontimeout = function() { healthErr = true; tryPopulate(); };
                                hxhr.send();

                                var exhr = new XMLHttpRequest();
                                exhr.open('POST', '/api/service/endpoints', true);
                                exhr.setRequestHeader('Content-Type', 'application/json');
                                exhr.timeout = 3000;
                                exhr.onload = function() {
                                    if (exhr.status === 200) {
                                        try {
                                            var ed = JSON.parse(exhr.responseText);
                                            endpointsData = ed.endpoints || [];
                                            _endpointCache[cardName] = endpointsData;
                                        } catch(e) { endpointsData = []; }
                                    } else { endpointsData = []; }
                                    _endpointCache[cardName] = endpointsData;
                                    tryPopulate();
                                };
                                exhr.onerror = function() { endpointsData = []; _endpointCache[cardName] = []; tryPopulate(); };
                                exhr.ontimeout = function() { endpointsData = []; _endpointCache[cardName] = []; tryPopulate(); };
                                exhr.send(JSON.stringify({name: cardName}));
                            }
                        }, 135);
                        setTimeout(function() {
                            if (self.parentNode) self.classList.remove('expanding');
                        }, 135);
                    }, 135);
                }, 100);
            } else {
                collapseExpandedCard(card, content, false);
            }
        });

        document.getElementById('searchToggle').addEventListener('click', function() {
            if (this.classList.contains('animating')) return;
            this.classList.add('animating');
            var self = this;
            setTimeout(function() { self.classList.remove('animating'); }, 200);
            var sb = document.getElementById('searchBar');
            if (sb.classList.contains('expanded-vertical')) {
                sb.classList.remove('expanded-vertical');
                this.setAttribute('data-label', 'Expand Filter Options');
                setTimeout(function() {
                    sb.classList.remove('expanded');
                    filterCards();
                }, 150);
            } else if (sb.classList.contains('expanded')) {
                sb.classList.add('expanded-vertical');
                refreshFilterPlaceholders();
                this.setAttribute('data-label', 'Collapse');
                filterCards();
            } else {
                sb.classList.add('expanded');
                setTimeout(function() {
                    sb.classList.add('expanded-vertical');
                    refreshFilterPlaceholders();
                    document.getElementById('searchToggle').setAttribute('data-label', 'Collapse');
                    filterCards();
                }, 150);
            }
        });

        function computeClientHash(name, port, timestamp) {
            var raw = name + ':' + port + ':' + timestamp;
            var encoder = new TextEncoder();
            var data = encoder.encode(raw);
            return crypto.subtle.digest('SHA-256', data).then(function(hashBuffer) {
                var hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
            });
        }

        function enrichClientsWithHashes(clients) {
            return Promise.all(clients.map(function(c) {
                if (c.hash) return Promise.resolve(c);
                return computeClientHash(c.name, c.port, c.timestamp).then(function(h) {
                    c.hash = h;
                    return c;
                });
            }));
        }

        document.getElementById('checkboxTerminateSelected').addEventListener('click', function() {
            var selected = Object.keys(_selectedCardHashes).filter(function(h) { return _selectedCardHashes[h]; });
            if (selected.length === 0) return;
            var content = document.getElementById('content');
            var loader = document.createElement('div');
            loader.className = 'content-loader';
            loader.innerHTML = '<div class="spinner"></div>';
            content.appendChild(loader);
            var pending = selected.length;
            selected.forEach(function(hash) {
                var card = document.querySelector('.service-card[data-hash="' + hash + '"]');
                var isBroken = card && card.classList.contains('service-card-unhealthy');
                var pid = card ? card.getAttribute('data-pid') : '';
                var apiPath = isBroken ? '/api/broken/forget' : '/api/service/terminate';
                var xhr = new XMLHttpRequest();
                xhr.open('POST', apiPath, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (--pending <= 0) {
                        var l = content.querySelector('.content-loader');
                        if (l) l.remove();
                        _clearCheckboxSelection();
                        fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                            enrichClientsWithHashes(d.clients).then(function(clients) {
                                buildCards(clients.filter(function(c) { return selected.indexOf(c.hash) === -1; }), false);
                            });
                        }).catch(function() { buildCards(currentClients, false); });
                    }
                };
                xhr.send(JSON.stringify({hash: hash, pid: pid || undefined}));
            });
        });

        document.getElementById('checkboxRestartSelected').addEventListener('click', function() {
            var selected = Object.keys(_selectedCardHashes).filter(function(h) { return _selectedCardHashes[h]; });
            if (selected.length === 0) return;
            var content = document.getElementById('content');
            var loader = document.createElement('div');
            loader.className = 'content-loader';
            loader.innerHTML = '<div class="spinner"></div>';
            content.appendChild(loader);
            var pending = selected.length;
            selected.forEach(function(hash) {
                var card = document.querySelector('.service-card[data-hash="' + hash + '"]');
                var isBroken = card && card.classList.contains('service-card-unhealthy');
                var apiPath = isBroken ? '/api/broken/restart' : '/api/service/restart';
                var xhr = new XMLHttpRequest();
                xhr.open('POST', apiPath, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (--pending <= 0) {
                        var l = content.querySelector('.content-loader');
                        if (l) l.remove();
                        _clearCheckboxSelection();
                        fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                            enrichClientsWithHashes(d.clients).then(function(clients) {
                                buildCards(clients, false);
                            });
                        }).catch(function() {});
                    }
                };
                xhr.send(JSON.stringify({hash: hash}));
            });
        });

        document.getElementById('checkboxProtectSelected').addEventListener('click', function() {
            var selected = Object.keys(_selectedCardHashes).filter(function(h) { return _selectedCardHashes[h]; });
            if (selected.length === 0) return;
            var content = document.getElementById('content');
            var loader = document.createElement('div');
            loader.className = 'content-loader';
            loader.innerHTML = '<div class="spinner"></div>';
            content.appendChild(loader);
            var allProtected = selected.every(function(h) {
                var c = document.querySelector('.service-card[data-hash="' + h + '"]');
                return c && c.getAttribute('data-protected') === 'true';
            });
            var apiPath = allProtected ? '/api/service/unprotect' : '/api/service/protect';
            var pending = selected.length;
            selected.forEach(function(hash) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', apiPath, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (--pending <= 0) {
                        var l = content.querySelector('.content-loader');
                        if (l) l.remove();
                        _clearCheckboxSelection();
                        fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                            enrichClientsWithHashes(d.clients).then(function(clients) {
                                buildCards(clients, false);
                            });
                        }).catch(function() {});
                    }
                };
                xhr.send(JSON.stringify({hash: hash}));
            });
        });

        document.getElementById('searchInput').addEventListener('input', filterCards);
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.key === 'Enter') { this.blur(); return; }
            if (e.key === 'Tab' && e.shiftKey) {
                e.preventDefault();
                var panel = document.getElementById('searchFilterPanel');
                var inputs = panel.querySelectorAll('.filter-input, .filter-select');
                if (inputs.length > 0) {
                    var last = inputs[inputs.length - 1];
                    last.focus();
                    if (last.tagName === 'INPUT') last.select();
                }
                return;
            }
            if (e.key === 'Backspace' && e.ctrlKey) {
                var start = this.selectionStart, end = this.selectionEnd;
                if (start !== end) {
                    this.value = this.value.substring(0, start) + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start;
                } else {
                    var val = this.value, pos = start;
                    while (pos > 0 && val[pos - 1] === ' ') pos--;
                    while (pos > 0 && val[pos - 1] !== ' ') pos--;
                    this.value = val.substring(0, pos) + val.substring(start);
                    this.selectionStart = this.selectionEnd = pos;
                }
                filterCards();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var hasCheckboxSelection = Object.keys(_selectedCardHashes).some(function(h) { return _selectedCardHashes[h]; });
                if (hasCheckboxSelection) {
                    _clearCheckboxSelection();
                    return;
                }
                var isInput = e.target.matches('input, select, textarea');
                var expanded = document.querySelector('.service-card.expanded');
                if (expanded && !isInput) {
                    collapseExpandedCard(expanded, document.getElementById('content'), false);
                    return;
                }
                if (document.querySelector('.sort-decoration.is-x')) {
                    closeSortMenu();
                    return;
                }
                var sb = document.getElementById('searchBar');
                if (!isInput && !sb.classList.contains('hidden') && (sb.classList.contains('expanded') || sb.classList.contains('expanded-vertical'))) {
                    sb.classList.remove('expanded-vertical');
                    document.getElementById('searchToggle').setAttribute('data-label', 'Expand Filter Options');
                    setTimeout(function() {
                        sb.classList.remove('expanded');
                        filterCards();
                    }, 150);
                    return;
                }
            }
            if (e.key === 'Enter') {
                if (document.querySelector('.service-card.expanded')) { e.preventDefault(); return; }
                var searchInput = document.getElementById('searchInput');
                if (document.activeElement === searchInput) return;
                if (searchInput.offsetParent === null) return;
                searchInput.focus();
                return;
            }
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key.length === 1) {
                var input = document.getElementById('searchInput');
                if (input.offsetParent === null) return;
                input.focus();
            }
        });

        document.getElementById('searchInput').value = '';
        loadSortOrder();
        buildFilterPanel();

        fetch('/api/health')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                document.getElementById('pill').innerHTML =
                    item('bind address', d.bind_address) +
                    item('hostname', d.hostname) +
                    item('port', d.port) +
                    item('pid', d.pid) +
                    (d.status === 'ok' ? item('status', d.status.toUpperCase(), 'status-ok') : item('status', d.status.toUpperCase(), 'status-error')) +
                    item('registered clients', d.registered_clients);
                var content = document.getElementById('content');
                var pw = document.querySelector('.pill').offsetWidth;
                var shutBtn = document.querySelector('.shutdown-btn');
                var btnW = shutBtn ? shutBtn.offsetWidth : 42;
                var rowW = pw + 10 + btnW;
                content.style.width = rowW + 'px';
                document.querySelector('.pill-row').style.width = rowW + 'px';
                document.getElementById('searchArea').style.width = ((pw - 10) / 2) + 'px';
                var cbActions = document.getElementById('checkboxActions');
                cbActions.style.width = rowW + 'px';
                var colW = (rowW - 20) / 3;
                cbActions.style.paddingLeft = (colW / 2) + 'px';
                cbActions.style.paddingRight = (rowW - (2 * colW + 10) - colW / 2) + 'px';
                document.getElementById('sidebar').style.top = content.offsetTop + 'px';
                document.getElementById('healthButton').style.top = content.offsetTop + 'px';
                if (d.status !== 'ok') {
                    document.body.classList.add('has-error');
                }
                fetch('/api/services')
                    .then(function(r) { return r.json(); })
                    .then(function(cd) { return enrichClientsWithHashes(cd.clients).then(function(clients) {
                        buildCards(clients, true);
                        refreshPendingApiKeyHashes();
                        triggerLoadInAnimation();
                        fetch('/api/services/healthcheck', { method: 'POST' })
                            .then(function(r) { return r.json(); })
                            .then(function(hd) {
                                applyHealthUpdates(hd.unhealthy);
                            })
                            .catch(function() {});
                    }); })
                    .catch(function() {
                        triggerLoadInAnimation();
                    });
            })
            .catch(function() {
                document.getElementById('pill').innerHTML =
                    item('bind address', 'error') +
                    item('hostname', 'error') +
                    item('port', 'error') +
                    item('pid', 'error') +
                    item('status', 'ERROR', 'status-error') +
                    item('registered clients', 'error');
                var content = document.getElementById('content');
                var pw = document.querySelector('.pill').offsetWidth;
                var shutBtn = document.querySelector('.shutdown-btn');
                var btnW = shutBtn ? shutBtn.offsetWidth : 42;
                var rowW = pw + 10 + btnW;
                content.style.width = rowW + 'px';
                document.querySelector('.pill-row').style.width = rowW + 'px';
                document.getElementById('searchArea').style.width = ((pw - 10) / 2) + 'px';
                var cbActions = document.getElementById('checkboxActions');
                cbActions.style.width = rowW + 'px';
                var colW = (rowW - 20) / 3;
                cbActions.style.paddingLeft = (colW / 2) + 'px';
                cbActions.style.paddingRight = (rowW - (2 * colW + 10) - colW / 2) + 'px';
                document.getElementById('sidebar').style.top = content.offsetTop + 'px';
                document.getElementById('healthButton').style.top = content.offsetTop + 'px';
                document.body.classList.add('has-error');
                triggerLoadInAnimation();
            });

    </script>
</body>
