<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceHandler</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1 class="title init-hidden"><a href="https://www.github.com/LorenBll/ServiceHandler" target="_blank" class="title-link">ServiceHandler</a></h1>
            <div class="pill-row">
                <div class="pill init-hidden" id="pill">
                    <div class="pill-item"><span class="pill-label">bind address</span><span class="pill-value">--</span></div>
                    <div class="pill-item"><span class="pill-label">hostname</span><span class="pill-value">--</span></div>
                    <div class="pill-item"><span class="pill-label">port</span><span class="pill-value">--</span></div>
                    <div class="pill-item"><span class="pill-label">status</span><span class="pill-value">--</span></div>
                    <div class="pill-item"><span class="pill-label">registered clients</span><span class="pill-value">--</span></div>
                </div>
                <button class="health-decoration shutdown-btn init-hidden" data-label="Shut Down ServiceHandler">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/></svg>
                </button>
            </div>
        </div>
        <div class="content" id="content"></div>
        <div class="search-area" id="searchArea">
            <div class="search-bar hidden" id="searchBar">
                <div class="search-toggle" id="searchToggle" data-label="Expand Filter Options">
                    <svg class="search-funnel-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/></svg>
                    <svg class="search-x-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </div>
                <div class="search-filter-panel" id="searchFilterPanel">
                </div>
                <div class="search-input-row">
                    <svg class="search-lens" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="Search service...">
                </div>
            </div>
            <div class="checkbox-actions" id="checkboxActions">
                <button class="card-btn card-btn-red" id="checkboxTerminateSelected" data-label="Terminate Selected Services">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 22v-5"/><path d="M14 19v-2"/><path d="M18 20v-3"/><path d="M2 13h20"/><path d="M6 20v-3"/></svg>
                </button>
                <button class="card-btn card-btn-yellow" id="checkboxRestartSelected" data-label="Restart Selected Services">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                </button>
                <button class="card-btn card-btn-shield" id="checkboxProtectSelected" data-label="Protect Selected Services">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
                </button>
            </div>
        </div>
        <div class="sidebar hidden" id="sidebar">
            <button class="sort-decoration hidden" data-label="Sort">
                <span class="sort-decoration-icons">
                    <svg class="sort-decoration-icon icon-sort" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
                    <svg class="sort-decoration-icon icon-x" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </span>
            </button>
            <div class="sort-items-casing" id="sortItemsCasing">
                <div class="sort-groupby-zone" id="sortGroupbyZone">
                    <div class="sort-groupby-placeholder" id="sortGroupbyPlaceholder">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5c0-1.1.9-2 2-2h2"/><path d="M17 3h2c1.1 0 2 .9 2 2v2"/><path d="M21 17v2c0 1.1-.9 2-2 2h-2"/><path d="M7 21H5c-1.1 0-2-.9-2-2v-2"/><rect width="7" height="5" x="7" y="7" rx="1"/><rect width="7" height="5" x="10" y="12" rx="1"/></svg>
                    </div>
                    <div class="sort-groupby-item" id="sortGroupbyItem">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5c0-1.1.9-2 2-2h2"/><path d="M17 3h2c1.1 0 2 .9 2 2v2"/><path d="M21 17v2c0 1.1-.9 2-2 2h-2"/><path d="M7 21H5c-1.1 0-2-.9-2-2v-2"/><rect width="7" height="5" x="7" y="7" rx="1"/><rect width="7" height="5" x="10" y="12" rx="1"/></svg>
                    </div>
                </div>
                <div class="sort-separator"></div>
                <div class="sort-item" draggable="true" data-key="name" data-label="Service Name">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="port" data-label="Service Port">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="1"/><circle cx="16" cy="12" r="1.5"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="pid" data-label="Service PID">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="bind_address" data-label="Bind IP Address">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 4.5-6 11-6 11s-6-6.5-6-11a6 6 0 0 1 12 0"/><circle cx="12" cy="8" r="2.5"/><path d="M8 18c-2 0-4 1-4 3h16c0-2-2-3-4-3"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="hostname" data-label="Hostname">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="status" data-label="Service Status">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/><path d="M3.22 13H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
                </div>
                <div class="sort-item" draggable="true" data-key="protected" data-label="Service Protection Status">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
                </div>
            </div>
        </div>
        <div class="health-button hidden" id="healthButton">
            <button class="health-decoration" data-label="Check Services' Health">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7.828 13.07A3 3 0 0 1 12 8.764a3 3 0 0 1 4.172 4.306l-3.447 3.62a1 1 0 0 1-1.449 0z"/></svg>
            </button>
            <button class="health-decoration broken-forget-btn init-hidden hidden" data-label="Forget All Broken Services">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 22v-5"/><path d="M14 19v-2"/><path d="M18 20v-3"/><path d="M2 13h20"/><path d="M6 20v-3"/></svg>
            </button>
            <button class="health-decoration broken-restart-btn init-hidden hidden" data-label="Restart All Broken Services">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
        </div>
    </div>

    <script>
        var sortOrder = ['name', 'port', 'pid', 'bind_address', 'hostname', 'status', 'protected'];
        var currentClients = [];
        var brokenClients = [];
        var _endpointCache = {};
        var forgottenHashes = {};
        var apiAskerHashes = {};
        var sidebar = document.getElementById('sidebar');
        var groupByKey = null;
        var originalSortOrder = null;
        var _expandTimeout = null;
        var _searchIndex = {};
        var _selectedCardHashes = {};
        var _checkboxVisible = false;
        function toggleSortHealthBtn(el, show) {
            if (!el) return;
            if (show) {
                var wasHidden = el.classList.contains('hidden');
                el.classList.remove('hidden');
                if (wasHidden && el.classList.contains('init-hidden')) {
                    el.classList.remove('init-hidden');
                    el.classList.add('load-in');
                    el.addEventListener('animationend', function() {
                        this.classList.remove('load-in');
                        this.style.animationDelay = '';
                    }, { once: true });
                }
            } else {
                if (el.classList.contains('hidden')) return;
                if (el.id === 'searchBar' && !document.querySelector('.service-card.expanded')) {
                    el.classList.remove('expanded', 'expanded-vertical');
                }
                el.classList.add('hidden');
            }
        }
        function isSubsequence(query, text) {
            var lowerText = text.toLowerCase();
            var lowerQuery = query.toLowerCase();
            var qi = 0;
            for (var ti = 0; ti < lowerText.length && qi < lowerQuery.length; ti++) {
                if (lowerText[ti] === lowerQuery[qi]) {
                    qi++;
                }
            }
            return qi === lowerQuery.length;
        }

        function matchesQuery(text, query) {
            return isSubsequence(query, String(text));
        }

        function cardEndpointMatches(card, query) {
            var name = card.querySelector('.card-name').textContent;
            var eps = _endpointCache[name];
            if (!eps || !eps.length) return false;
            for (var i = 0; i < eps.length; i++) {
                if (eps[i].description && matchesQuery(eps[i].description, query)) return true;
                if (eps[i].path && matchesQuery(eps[i].path, query)) return true;
            }
            return false;
        }

        function _buildSearchIndex() {
            _searchIndex = {};
            var cards = document.querySelectorAll('.service-card');
            cards.forEach(function(card) {
                var hash = card.getAttribute('data-hash') || '';
                var name = card.querySelector('.card-name').textContent;
                var metaItems = card.querySelectorAll('.card-meta-value');
                var bindAddr = metaItems[0] ? metaItems[0].textContent : '';
                var host = metaItems[1] ? metaItems[1].textContent : '';
                var port = metaItems[2] ? metaItems[2].textContent : '';
                var pid = metaItems[3] ? metaItems[3].textContent : '';
                var allText = [name, bindAddr, host, port, pid].join(' ');
                var tokens = allText.toLowerCase().split(/[^a-z0-9]+/).filter(function(t) { return t.length >= 2; });
                var seen = {};
                tokens.forEach(function(t) {
                    if (!seen[t]) {
                        seen[t] = true;
                        if (!_searchIndex[t]) _searchIndex[t] = [];
                        _searchIndex[t].push(card);
                    }
                });
            });
        }

        function setSortMenuOpen(open) {
            var btn = document.querySelector('.sort-decoration');
            if (!btn) return;
            var casing = document.getElementById('sortItemsCasing');
            var sortItems = document.querySelectorAll('.sort-item');
            var groupbyZone = document.getElementById('sortGroupbyZone');
            var separator = document.querySelector('.sort-separator');
            var animItems = [];
            if (groupbyZone) animItems.push(groupbyZone);
            if (separator) animItems.push(separator);
            sortItems.forEach(function(item) { animItems.push(item); });
            if (open) {
                if (btn.classList.contains('is-x')) return;
                btn.classList.add('is-x');
                casing.classList.add('visible');
                animateGroupByZone();
                animItems.forEach(function(item, i) {
                    setTimeout(function() {
                        item.classList.add('visible');
                    }, i * 40);
                });
                return;
            }
            if (!btn.classList.contains('is-x')) return;
            casing.classList.remove('visible');
            btn.classList.remove('is-x');
            animItems.forEach(function(item, i) {
                setTimeout(function() {
                    item.classList.remove('visible', 'dragging');
                }, (animItems.length - 1 - i) * 40);
            });
        }

        function getFilterSvg(key) {
            var icons = {
                name: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',
                port: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="1"/><circle cx="16" cy="12" r="1.5"/></svg>',
                pid: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>',
                bind_address: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 4.5-6 11-6 11s-6-6.5-6-11a6 6 0 0 1 12 0"/><circle cx="12" cy="8" r="2.5"/><path d="M8 18c-2 0-4 1-4 3h16c0-2-2-3-4-3"/></svg>',
                hostname: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
                status: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/><path d="M3.22 13H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>',
                api_asker: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
                protected: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>'
            };
            return icons[key] || '';
        }

        function getFilterLabel(key) {
            var m = { name: 'Service Name', port: 'Port', pid: 'PID', bind_address: 'Bind IP Address', hostname: 'Hostname', status: 'Service Status', api_asker: 'API Asker', protected: 'Service Protection Status' };
            return m[key] || key;
        }

        var filterExamples = {
            name: ['nginx', 'apache2', 'node_app', 'postgres', 'redis', 'mongod', 'docker-proxy'],
            port: ['8080', '3000', '5000', '443', '5432', '6379', '27017'],
            pid: ['1234', '5678', '9012', '3456', '7890'],
            bind_address: ['127.0.0.1', '0.0.0.0', '192.168.1.1', '10.0.0.1', '::1'],
            hostname: ['localhost', 'server-01', 'node-1', 'docker-host', 'prod-srv']
        };
        function randomExample(key) {
            var list = filterExamples[key];
            if (!list || !list.length) return '';
            return list[Math.floor(Math.random() * list.length)];
        }
        function refreshFilterPlaceholders() {
            var panel = document.getElementById('searchFilterPanel');
            if (!panel) return;
            panel.querySelectorAll('.filter-input').forEach(function(el) {
                var key = el.getAttribute('data-key');
                el.setAttribute('placeholder', randomExample(key));
            });
        }
        function buildFilterPanel() {
            var panel = document.getElementById('searchFilterPanel');
            if (!panel) return;
            var html = '<div class="filter-header">Filter Options</div>';
            var keys = sortOrder.filter(function(k) { return getFilterLabel(k); });
            for (var i = 0; i < keys.length; i += 2) {
                html += '<div class="filter-row">';
                function makeCouple(k) {
                    var label = getFilterLabel(k);
                    var icon = getFilterSvg(k);
                    if (k === 'status') {
                        return '<span class="filter-couple"><span class="filter-icon" data-label="' + label + '">' + icon + '</span><select class="filter-select" data-key="status"><option value="any">Any</option><option value="operational">Operational</option><option value="api_asker">API Asker</option><option value="broken">Broken</option></select></span>';
                    }
                    if (k === 'protected') {
                        return '<span class="filter-couple"><span class="filter-icon" data-label="' + label + '">' + icon + '</span><select class="filter-select" data-key="protected"><option value="any">Any</option><option value="Protected">Protected</option><option value="Unprotected">Unprotected</option></select></span>';
                    }
                    return '<span class="filter-couple"><span class="filter-icon" data-label="' + label + '">' + icon + '</span><input type="text" class="filter-input" data-key="' + k + '" placeholder="' + randomExample(k) + '"></span>';
                }
                html += makeCouple(keys[i]);
                if (i + 1 < keys.length) html += makeCouple(keys[i + 1]);
                html += '</div>';
            }
            panel.innerHTML = html;
            var allFilterInputs = panel.querySelectorAll('.filter-input, .filter-select');
            allFilterInputs.forEach(function(el) {
                el.addEventListener('input', function() {
                    var key = this.getAttribute('data-key');
                    var prev = this.value;
                    if (key === 'port' || key === 'pid') {
                        this.value = this.value.replace(/[^0-9]/g, '');
                    } else if (key === 'bind_address') {
                        this.value = this.value.replace(/[^0-9.]/g, '');
                    }
                    if (this.value === '' && prev === this.value) {
                        this.setAttribute('placeholder', randomExample(key));
                    }
                    filterCards();
                });
                el.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') { this.blur(); return; }
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        var inputs = Array.from(panel.querySelectorAll('.filter-input, .filter-select'));
                        if (inputs.length === 0) return;
                        var rows = Math.ceil(inputs.length / 2);
                        var curIdx = inputs.indexOf(this);
                        var curRow = Math.floor(curIdx / 2);
                        var curCol = curIdx % 2;
                        var curCmIdx = curCol * rows + curRow;
                        if (e.shiftKey) {
                            if (curCmIdx === 0) {
                                document.getElementById('searchInput').focus();
                                document.getElementById('searchInput').select();
                                return;
                            }
                            var nextCmIdx = curCmIdx - 1;
                        } else {
                            if (curCmIdx === inputs.length - 1) {
                                document.getElementById('searchInput').focus();
                                document.getElementById('searchInput').select();
                                return;
                            }
                            var nextCmIdx = curCmIdx + 1;
                        }
                        var nextRow = nextCmIdx % rows;
                        var nextCol = Math.floor(nextCmIdx / rows);
                        var nextIdx = nextCol === 0 ? nextRow * 2 : nextRow * 2 + 1;
                        if (nextIdx < inputs.length) {
                            inputs[nextIdx].focus();
                            if (inputs[nextIdx].tagName === 'INPUT') inputs[nextIdx].select();
                        }
                    }
                });
            });
            var sel = panel.querySelector('.filter-select');
            if (sel) sel.addEventListener('change', filterCards);
        }

        function getActiveFilters() {
            var sb = document.getElementById('searchBar');
            if (!sb.classList.contains('expanded-vertical')) return null;
            var panel = document.getElementById('searchFilterPanel');
            if (!panel) return null;
            var filters = {};
            panel.querySelectorAll('.filter-input').forEach(function(el) {
                var val = el.value.trim();
                if (val) filters[el.getAttribute('data-key')] = val;
            });
            panel.querySelectorAll('.filter-select').forEach(function(el) {
                var val = el.value;
                if (val !== 'any') filters[el.getAttribute('data-key')] = val;
            });
            return Object.keys(filters).length > 0 ? filters : null;
        }

        function cardMatchesFilters(card, filters) {
            if (!filters) return true;
            var metaItems = card.querySelectorAll('.card-meta-value');
            for (var key in filters) {
                var fv = filters[key];
                var cv = '';
                if (key === 'name') {
                    cv = card.querySelector('.card-name').textContent;
                } else                 if (key === 'status') {
                    if (card.classList.contains('service-card-unhealthy')) {
                        cv = 'broken';
                    } else if (card.classList.contains('service-card-api-asker')) {
                        cv = 'api_asker';
                    } else {
                        cv = 'operational';
                    }
                } else if (key === 'bind_address') {
                    cv = metaItems[0] ? metaItems[0].textContent : '';
                } else if (key === 'hostname') {
                    cv = metaItems[1] ? metaItems[1].textContent : '';
                } else if (key === 'port') {
                    cv = metaItems[2] ? metaItems[2].textContent : '';
                } else if (key === 'pid') {
                    cv = metaItems[3] ? metaItems[3].textContent : '';
                } else if (key === 'protected') {
                    cv = card.getAttribute('data-protected') === 'true' ? 'Protected' : 'Unprotected';
                }
                if (key === 'status' || key === 'protected') {
                    if (fv !== cv) return false;
                } else {
                    if (!matchesQuery(cv, fv)) return false;
                }
            }
            return true;
        }

        function filterCards() {
            var query = document.getElementById('searchInput').value;
            var filters = getActiveFilters();
            var cards = document.querySelectorAll('.service-card');
            var content = document.getElementById('content');
            var existingMsg = content.querySelector('.search-empty');
            if (existingMsg) existingMsg.remove();
            content.classList.remove('no-results');

            var queryTokens = query ? query.toLowerCase().split(/[^a-z0-9]+/).filter(function(t) { return t.length >= 2; }) : [];
            var indexMatched = null;
            if (queryTokens.length > 0) {
                queryTokens.forEach(function(t) {
                    var matched = _searchIndex[t];
                    if (matched) {
                        if (indexMatched === null) {
                            indexMatched = new Set(matched);
                        } else {
                            indexMatched = new Set([...indexMatched].filter(function(c) { return matched.indexOf(c) !== -1; }));
                        }
                    } else {
                        if (indexMatched === null) indexMatched = new Set();
                    }
                });
            }

            var visible = 0;
            cards.forEach(function(card) {
                var name = card.querySelector('.card-name').textContent;
                var metaItems = card.querySelectorAll('.card-meta-value');
                var bindAddr = metaItems[0] ? metaItems[0].textContent : '';
                var host = metaItems[1] ? metaItems[1].textContent : '';
                var port = metaItems[2] ? metaItems[2].textContent : '';
                var pid = metaItems[3] ? metaItems[3].textContent : '';
                var matchesFilter = cardMatchesFilters(card, filters);
                var matchesSearch = !query;
                if (!matchesSearch) {
                    if (indexMatched && indexMatched.has(card)) {
                        matchesSearch = true;
                    } else {
                        matchesSearch = matchesQuery(name, query) || matchesQuery(port, query) || matchesQuery(pid, query) || matchesQuery(bindAddr, query) || matchesQuery(host, query) || cardEndpointMatches(card, query);
                    }
                }
                if (matchesFilter && matchesSearch) {
                    card.style.display = '';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            content.querySelectorAll('.group-section').forEach(function(section) {
                var hasVisible = false;
                section.querySelectorAll('.service-card').forEach(function(c) {
                    if (c.style.display !== 'none') hasVisible = true;
                });
                section.style.display = hasVisible ? '' : 'none';
            });
            if (visible === 0 && cards.length > 0 && (query || filters)) {
                var msg = document.createElement('div');
                msg.className = 'search-empty';
                msg.textContent = 'No Service Matching Research Found';
                content.appendChild(msg);
                content.classList.add('no-results');
            }
            var totalCount = cards.length;
            document.querySelectorAll('#pill .pill-item').forEach(function(pi) {
                if (pi.querySelector('.pill-label').textContent === 'registered clients') {
                    pi.querySelector('.pill-value').textContent = String(totalCount);
                }
            });
            var expandedEl = document.querySelector('.service-card.expanded');
            var searchBar = document.getElementById('searchBar');
            var sidebarEl = document.getElementById('sidebar');
            var sortBtn = document.querySelector('.sort-decoration');
            var healthButton = document.getElementById('healthButton');
            var brokenForgetBtn = healthButton.querySelector('.broken-forget-btn');
            var brokenRestartBtn = healthButton.querySelector('.broken-restart-btn');
            var sortItemsCasing = document.getElementById('sortItemsCasing');

            var totalServices = document.querySelectorAll('.service-card').length;
            var searchVisible = totalServices >= 2 && !expandedEl;
            var sortVisible = visible > 0 && !expandedEl;
            var sidebarVisible = sortVisible || (visible >= 2 && !expandedEl);
            var healthVisible = visible > 0;
            var visibleBrokenCount = 0;
            document.querySelectorAll('.service-card').forEach(function(c) {
                if (c.style.display === 'none') return;
                if (c.classList.contains('service-card-unhealthy')) visibleBrokenCount++;
            });
            var brokenVisible = visibleBrokenCount > 0 && !expandedEl;
            var singleCard = visible <= 1;

            toggleSortHealthBtn(searchBar, searchVisible);
            sidebarEl.classList.toggle('hidden', !sidebarVisible);
            if (!sidebarVisible && sortBtn && sortBtn.classList.contains('is-x')) {
                setSortMenuOpen(false);
            }
            toggleSortHealthBtn(sortBtn, sortVisible && !singleCard);
            toggleSortHealthBtn(healthButton, healthVisible);
            toggleSortHealthBtn(brokenForgetBtn, brokenVisible);
            toggleSortHealthBtn(brokenRestartBtn, brokenVisible);
        }

        function setGroupBy(key) {
            groupByKey = key;
            originalSortOrder = sortOrder.slice();
            var idx = sortOrder.indexOf(key);
            if (idx > 0) {
                sortOrder.splice(idx, 1);
                sortOrder.unshift(key);
            }
            var zone = document.getElementById('sortGroupbyZone');
            var placeholder = document.getElementById('sortGroupbyPlaceholder');
            var item = document.getElementById('sortGroupbyItem');

                    item.innerHTML = svg.outerHTML;
                }
                item.setAttribute('data-label', sortItem.getAttribute('data-label') || '');

        function clearGroupBy() {
            var key = groupByKey;
            if (!key) return;
            groupByKey = null;
            if (originalSortOrder) {
                sortOrder = originalSortOrder;
                originalSortOrder = null;
            }
            if (sortOrder.indexOf('protected') === -1) sortOrder.push('protected');
            var zone = document.getElementById('sortGroupbyZone');
            var placeholder = document.getElementById('sortGroupbyPlaceholder');
            var item = document.getElementById('sortGroupbyItem');
            var sortItem = document.querySelector('.sort-item[data-key="' + key + '"]');
            zone.classList.remove('filled');
            placeholder.classList.remove('hidden');
            item.classList.remove('visible');
            if (sortItem) { sortItem.classList.remove('group-by'); sortItem.setAttribute('draggable', 'true'); }
            applySortOrderToSidebar();
            saveSortSettings();
        }

        function saveSortSettings() {
            var body = {sort_order: sortOrder};
            body.group_by = groupByKey || null;
            if (groupByKey && originalSortOrder) {
                body.original_sort_order = originalSortOrder;
            } else if (!groupByKey) {
                body.original_sort_order = null;
            } else {
                body.original_sort_order = sortOrder.slice();
            }
            fetch('/ui/sort-settings', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},

            }).then(function(r) {

        function populateExpandedContent(card, healthData, endpoints) {
            var excluded = ['service', 'bind_address', 'hostname', 'port', 'pid'];
            var container = card.querySelector('.card-expanded-content');
            if (!container) return;
            container.innerHTML = '';
            var items = [];
            Object.keys(healthData).forEach(function(k) {
                if (excluded.indexOf(k) >= 0) return;
                var v = healthData[k];
                if (v === null || v === undefined) return;
                var label = k.replace(/_/g, ' ');
                label = label.charAt(0).toUpperCase() + label.slice(1);
                var valClass = '';
                if (k === 'status') {
                    v = String(v).toUpperCase();
                    valClass = v === 'OK' ? ' expand-status-ok' : ' expand-status-error';
                }
                items.push({label: label, value: v, valClass: valClass, isLong: String(v).length > 25});
            });
            if (items.length === 0) {
                if (endpoints && endpoints.length) {
                    var epHtml = '';
                    epHtml += '<div class="expand-endpoints-section">';
                    endpoints.forEach(function(ep) {
                        epHtml += buildEndpointCard(ep);
                    });
                    epHtml += '</div>';
                    container.innerHTML = epHtml;
                } else {
                    container.innerHTML = '<div class="expand-empty">No Other Information to Display</div>';
                }
                return;
            }
            var shortItems = items.filter(function(it) { return !it.isLong; });
            var longItems = items.filter(function(it) { return it.isLong; });
            var rows = [];
            var i = 0;
            while (i < shortItems.length) {
                var first = shortItems[i];
                var second = shortItems[i + 1];
                if (!second) {
                    rows.push([first, null]);
                    i++;
                } else {
                    rows.push([first, second]);
                    i += 2;
                }
            }
            longItems.forEach(function(it) {
                rows.push([it, null]);
            });
            var html = '';
            rows.forEach(function(row) {
                html += '<div class="expand-info-row">';
                html += '<div class="expand-info-item' + (row[1] === null ? ' expand-info-item-full' : '') + '">' +
                    '<span class="expand-info-label">' + row[0].label + '</span>' +
                    '<span class="expand-info-value' + row[0].valClass + '">' + row[0].value + '</span>' +
                    '</div>';
                if (row[1] !== null) {
                    html += '<div class="expand-info-item">' +
                        '<span class="expand-info-label">' + row[1].label + '</span>' +
                        '<span class="expand-info-value' + row[1].valClass + '">' + row[1].value + '</span>' +
                        '</div>';
                }
                html += '</div>';
            });
            html += '<div class="expand-separator"></div>';
            if (endpoints && endpoints.length) {
                html += '<div class="expand-endpoints-section">';
                endpoints.forEach(function(ep) {
                    html += buildEndpointCard(ep);
                });
                html += '</div>';
            }
            container.innerHTML = html;
        }

        function getPathVarTypes(path) {
            var types = {};
            var regex = /<([^>]+)>/g;
            var match;
            while ((match = regex.exec(path)) !== null) {
                var content = match[1];
                var parts = content.split(':');
                if (parts.length === 2) {
                    types[parts[1]] = parts[0];
                } else {
                    types[parts[0]] = 'string';
                }
            }
            return types;
        }

        function buildEndpointCard(ep) {
            var cardHtml = '<div class="expand-endpoint-card">' +
                '<div class="expand-endpoint-card-header">' +
                '<span class="expand-endpoint-verb">' + ep.verb + '</span>' +
                '<span class="expand-endpoint-path">' + ep.path + '</span>' +
                '<span class="expand-endpoint-desc">' + (ep.description || '') + '</span>' +
                '</div>';
            var hasVars = ep.path_variables && ep.path_variables.length;
            var hasSchema = ep.body_schema && Object.keys(ep.body_schema).length;
            if (hasVars || hasSchema) {
                cardHtml += '<div class="expand-endpoint-card-body">';
                if (hasVars) {
                    var varTypes = getPathVarTypes(ep.path);
                    cardHtml += '<div class="expand-endpoint-section">' +
                        '<div class="expand-endpoint-section-title">Path Variables</div>' +
                        '<div class="expand-endpoint-section-content">';
                    ep.path_variables.forEach(function(v) {
                        var name = typeof v === 'object' ? (v.name || JSON.stringify(v)) : String(v);
                        var type = varTypes[name] || 'string';
                        cardHtml += '<div class="expand-endpoint-var-item">' + name + '<span class="expand-endpoint-var-type">' + type + '</span></div>';
                    });
                    cardHtml += '</div></div>';
                }
                if (hasSchema) {
                    cardHtml += '<div class="expand-endpoint-section">' +
                        '<div class="expand-endpoint-section-title">Body Schema</div>' +
                        '<pre class="expand-endpoint-section-content expand-endpoint-schema">' + JSON.stringify(ep.body_schema, null, 2) + '</pre>' +
                        '<div class="expand-endpoint-schema-actions">' +
                        '<button class="expand-endpoint-schema-btn" data-label="Copy to Clipboard" onclick="copySchema(this)">' +
                        '<svg class="expand-endpoint-schema-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 15l-3-3-3 3"/><path d="M12 12v7"/></svg>' +
                        '</button>' +
                        '<button class="expand-endpoint-schema-btn" data-label="Download" onclick="downloadSchema(event, this)">' +
                        '<svg class="expand-endpoint-schema-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
                        '</button>' +
                        '</div>' +
                        '</div>';
                }
                cardHtml += '</div>';
            }
            cardHtml += '</div>';
            return cardHtml;
        }

        function copySchema(btn) {
            var pre = btn.closest('.expand-endpoint-section').querySelector('.expand-endpoint-schema');
            var text = pre.textContent;
            navigator.clipboard.writeText(text).then(function() {
                var icon = btn.querySelector('.expand-endpoint-schema-icon');
                var origHTML = icon.outerHTML;
                var origLabel = btn.getAttribute('data-label');
                icon.outerHTML = '<svg class="expand-endpoint-schema-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                btn.setAttribute('data-label', 'Copied!');
                setTimeout(function() {
                    btn.querySelector('.expand-endpoint-schema-icon').outerHTML = origHTML;
                    btn.setAttribute('data-label', origLabel);
                }, 1750);
            });
        }

        function downloadSchema(ev, btn) {
            ev.stopPropagation();
            var pre = btn.closest('.expand-endpoint-section').querySelector('.expand-endpoint-schema');
            var text = pre.textContent;
            var blob = new Blob([text], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'schema.json';
            a.addEventListener('click', function(ev2) { ev2.stopPropagation(); });
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function _syncCheckboxUI() {
            var hasSelection = false;
            var cardCount = document.querySelectorAll('.service-card:not([style*="display: none"])').length;
            Object.keys(_selectedCardHashes).forEach(function(h) {
                if (_selectedCardHashes[h]) hasSelection = true;
            });
            var content = document.getElementById('content');
            content.querySelectorAll('.card-checkbox').forEach(function(cb) {
                cb.classList.toggle('visible', _checkboxVisible && cardCount > 1 && !document.querySelector('.service-card.expanded'));
                var h = cb.getAttribute('data-card-hash');
                var checked = !!_selectedCardHashes[h];
                cb.classList.toggle('checked', checked);
                var card = cb.closest('.service-card');
                if (card) card.classList.toggle('selected', checked);
            });
            document.body.classList.toggle('checkbox-active', hasSelection);
            document.body.classList.toggle('checkbox-visible', hasSelection && !document.querySelector('.service-card.expanded'));

            var hasProtectedSelected = false;
            var allProtected = true;
            if (hasSelection) {
                Object.keys(_selectedCardHashes).forEach(function(h) {
                    if (_selectedCardHashes[h]) {
                        var c = document.querySelector('.service-card[data-hash="' + h + '"]');
                        if (c && c.getAttribute('data-protected') === 'true') hasProtectedSelected = true;
                        if (c && c.getAttribute('data-protected') !== 'true') allProtected = false;
                    }
                });
            }
            var checkboxTermBtn = document.getElementById('checkboxTerminateSelected');
            var checkboxRestartBtn = document.getElementById('checkboxRestartSelected');
            if (checkboxTermBtn) checkboxTermBtn.disabled = hasProtectedSelected;
            if (checkboxRestartBtn) checkboxRestartBtn.disabled = hasProtectedSelected;

            var checkboxProtectBtn = document.getElementById('checkboxProtectSelected');
            if (checkboxProtectBtn) {
                checkboxProtectBtn.classList.toggle('protected', hasSelection && allProtected);
                checkboxProtectBtn.setAttribute('data-label', hasSelection && allProtected ? 'Unprotect Selected Services' : 'Protect Selected Services');
            }

            var brokenForgetBtn = document.querySelector('.broken-forget-btn');
            var brokenRestartBtn = document.querySelector('.broken-restart-btn');
            var protectedBrokenExists = false;
            document.querySelectorAll('.service-card.service-card-unhealthy').forEach(function(c) {
                if (c.getAttribute('data-protected') === 'true') protectedBrokenExists = true;
            });
            if (brokenForgetBtn) brokenForgetBtn.disabled = hasSelection || protectedBrokenExists;
            if (brokenRestartBtn) brokenRestartBtn.disabled = hasSelection || protectedBrokenExists;

            var healthBtn = document.querySelector('#healthButton > .health-decoration:first-child');

        function _clearCheckboxSelection() {
            _selectedCardHashes = {};
            _checkboxVisible = false;
            _syncCheckboxUI();
        }

        function sortClients(clients) {
            var keys = sortOrder;
            clients.sort(function(a, b) {
                for (var k = 0; k < keys.length; k++) {
                    var key = keys[k];
                    if (key === 'status') {
                        function statusRank(client) {
                            if (brokenClients.some(function(bc) { return bc.hash === client.hash; })) return 2;
                            if (apiAskerHashes[client.hash]) return 1;
                            return 0;
                        }
                        var rA = statusRank(a);
                        var rB = statusRank(b);
                        if (rA < rB) return -1;
                        if (rA > rB) return 1;
                        continue;
                    }
                    var va = a[key];
                    var vb = b[key];
                    if (typeof va === 'number' && typeof vb === 'number') {
                        if (va < vb) return -1;
                        if (va > vb) return 1;
                    } else {
                        var sa = String(va || '');
                        var sb = String(vb || '');
                        var cmp = sa.localeCompare(sb);
                        if (cmp !== 0) return cmp;
                    }
                }
                return 0;
            });
        }

        function buildCards(clients, animate) {
            currentClients = clients;
            var brokenHashes = {};
            brokenClients.forEach(function(bc) { brokenHashes[bc.hash] = true; });
            var healthyClients = [];
            clients.forEach(function(c) {
                if (!brokenHashes[c.hash] && !forgottenHashes[c.hash]) healthyClients.push(c);
            });
            sortClients(healthyClients);
            var content = document.getElementById('content');
            var expandedCard = content.querySelector('.service-card.expanded');
            var hadExpanded = expandedCard ? {
                hash: expandedCard.getAttribute('data-hash'),
                name: expandedCard.querySelector('.card-name').textContent
            } : null;
            content.classList.remove('expanded');
            content.style.height = '';
            content.querySelectorAll('.service-card').forEach(function(c) {
                c.classList.remove('expanded', 'expanded-active', 'expanded-buttons');
                c.style.top = '';
                c.style.left = '';
                c.style.width = '';
                c.style.height = '';
                c.style.position = '';
                c.style.pointerEvents = '';
                c.style.zIndex = '';
                c.style.minHeight = '';
                c.style.gridColumn = '';
            });
            var placeholder = content.querySelector('.expand-placeholder');
            if (placeholder) placeholder.remove();
            document.getElementById('searchInput').disabled = false;
            content.innerHTML = '';
            if (healthyClients.length === 0 && brokenClients.length === 0) {
                var emptyEl = document.createElement('div');
                emptyEl.className = 'empty-state' + (animate ? ' init-hidden' : '');
                emptyEl.textContent = 'No Service Registered';
                content.appendChild(emptyEl);
                updateVisibility(0, 0, animate);
                return;
            }

            function createCardElement(c, idx, broken, firstLoad) {
                var cardDiv = document.createElement('div');
                var isAsker = !broken && (apiAskerHashes[c.hash] || false);
                var isProtected = c.protected === true;
                cardDiv.innerHTML = cardHTML(c.name, c.port, c.pid || '', !broken, c.bind_address, c.hostname, c.starting_script, isAsker, c.hash, isProtected);
                var card = cardDiv.firstElementChild;
                if (firstLoad) card.classList.add('init-hidden');
                card.setAttribute('data-hash', c.hash || '');
                card.setAttribute('data-port', c.port || '');
                card.setAttribute('data-starting-script', c.starting_script || '');
                card.setAttribute('data-pid', c.pid !== undefined && c.pid !== '' ? String(c.pid) : '');
                card.setAttribute('data-protected', isProtected ? 'true' : 'false');
                if (!broken) {
                    var alreadyBroken = brokenClients.some(function(bc) { return bc.hash === c.hash; });
                    if (alreadyBroken) {
                        card.classList.add('service-card-unhealthy');
                        updateCardButtonLabels(card);
                    }
                }
                return card;
            }

            var cardIndex = 0;
            var allClients = healthyClients.concat(brokenClients.filter(function(bc) { return !forgottenHashes[bc.hash]; }));
            if (groupByKey && allClients.length > 1) {
                var groups = {};
                allClients.forEach(function(c) {
                    var val;
                    if (groupByKey === 'status') {
                        if (brokenClients.some(function(bc) { return bc.hash === c.hash; })) {
                            val = 'Broken';
                        } else if (apiAskerHashes[c.hash]) {
                            val = 'API Asker';
                        } else {
                            val = 'Operational';
                        }
                    } else if (groupByKey === 'protected') {
                        val = c.protected ? 'Protected' : 'Unprotected';
                    } else {
                        val = c[groupByKey];
                    }
                    var key = val !== undefined && val !== null ? String(val) : '';
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(c);
                });
                var groupKeys = Object.keys(groups).sort(function(a, b) {
                    if (a === '') return 1;
                    if (b === '') return -1;
                    var na = Number(a), nb = Number(b);
                    if (!isNaN(na) && !isNaN(nb)) return na - nb;
                    return a.localeCompare(b);
                });
                var groupLabel = '';
                var sortItem = document.querySelector('.sort-item[data-key="' + groupByKey + '"]');
                if (sortItem) groupLabel = sortItem.getAttribute('data-label') || groupByKey;
                groupKeys.forEach(function(gk) {
                    var section = document.createElement('div');
                    section.className = 'group-section';
                    var header = document.createElement('div');
                    header.className = 'group-header';
                    header.textContent = groupLabel + ' : ' + (gk || '(empty)');
                    section.appendChild(header);
                    var gIdx = 0;
                    groups[gk].forEach(function(c) {
                        var isBroken = brokenClients.some(function(bc) { return bc.hash === c.hash; });
                        section.appendChild(createCardElement(c, gIdx++, isBroken, animate));
                    });
                    content.appendChild(section);
                });
            } else {
                allClients.forEach(function(c) {
                    var isBroken = brokenClients.some(function(bc) { return bc.hash === c.hash; });
                    content.appendChild(createCardElement(c, cardIndex++, isBroken, animate));
                });
            }
            if (hadExpanded) {
                var stillExists = clients.some(function(c) { return (c.hash || '') === hadExpanded.hash; }) || brokenClients.some(function(c) { return (c.hash || '') === hadExpanded.hash; });
                if (!stillExists) {
                    var ghostDiv = document.createElement('div');
                    var ghostProtected = clients.some(function(c) { return (c.hash || '') === hadExpanded.hash && c.protected; });
                    ghostDiv.innerHTML = cardHTML(hadExpanded.name, '--', '--', false, '', '', '', false, '', ghostProtected);
                    var ghostCard = ghostDiv.firstElementChild;
                    ghostCard.style.position = 'absolute';
                    ghostCard.style.top = '0';
                    ghostCard.style.left = '0';
                    ghostCard.style.width = '100%';
                    ghostCard.style.height = '100%';
                    ghostCard.style.zIndex = '10';
                    ghostCard.style.minHeight = '0';
                    ghostCard.style.gridColumn = '1 / -1';
                    ghostCard.classList.add('expanded', 'expanded-active', 'expanded-buttons');
                    var overlay = document.createElement('div');
                    overlay.className = 'expand-overlay';
                    overlay.innerHTML = '<span class="expand-overlay-text">' + hadExpanded.name + ' is not reachable any longer</span>';
                    ghostCard.appendChild(overlay);
                    content.style.height = content.getBoundingClientRect().height + 'px';
                    content.classList.add('expanded');
                    content.appendChild(ghostCard);
                }
            }

            updateVisibility(content.querySelectorAll('.service-card').length, undefined, animate);
            if (document.getElementById('searchBar').classList.contains('expanded-vertical')) filterCards();
            _syncCheckboxUI();
            _buildSearchIndex();
        }

        var draggedItem = null;

        sidebar.addEventListener('dragstart', function(e) {
            var item = e.target.closest('.sort-item');
            if (!item) return;
            if (item.classList.contains('group-by')) { e.preventDefault(); return; }
            draggedItem = item;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(function() { item.classList.add('dragging'); }, 0);
        });

        sidebar.addEventListener('dragend', function(e) {
            var item = e.target.closest('.sort-item');
            if (item) item.classList.remove('dragging');
            draggedItem = null;
        });

        sidebar.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var target = e.target.closest('.sort-item');
            if (!target || target === draggedItem || target.classList.contains('group-by')) return;
            var casing = document.getElementById('sortItemsCasing');
            var items = Array.from(casing.querySelectorAll('.sort-item'));
            var fromIdx = items.indexOf(draggedItem);
            var toIdx = items.indexOf(target);
            if (fromIdx < toIdx) {
                casing.insertBefore(draggedItem, target.nextSibling);
            } else {
                casing.insertBefore(draggedItem, target);
            }
        });

        sidebar.addEventListener('drop', function(e) {
            e.preventDefault();
            var casing = document.getElementById('sortItemsCasing');
                var items = Array.from(casing.querySelectorAll('.sort-item'));
                sortOrder = items.map(function(el) { return el.getAttribute('data-key'); });
                saveSortOrder(sortOrder);
                if (currentClients.length) {
                    buildCards(currentClients, false);
                }
        });

        var groupbyZone = document.getElementById('sortGroupbyZone');

        groupbyZone.addEventListener('dragenter', function(e) {
            if (!draggedItem) return;
            this.classList.add('drag-over');
        });

        groupbyZone.addEventListener('dragleave', function(e) {
            if (this.contains(e.relatedTarget)) return;
            this.classList.remove('drag-over');
        });

        groupbyZone.addEventListener('dragover', function(e) {
            if (!draggedItem) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        groupbyZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (!draggedItem) return;
            var key = draggedItem.getAttribute('data-key');
            if (key === groupByKey) return;
            var prevKey = groupByKey;
            clearGroupBy();
            setGroupBy(key);
            if (currentClients.length) {
                buildCards(currentClients, false);
            }
        });

                buildCards(currentClients, false);
            }
        });

        function closeSortMenu() {
            setSortMenuOpen(false);
            document.getElementById('sortGroupbyZone').classList.remove('drag-over');
            draggedItem = null;
        }

        document.querySelector('.sort-decoration').addEventListener('click', function() {
            if (this.classList.contains('animating')) return;
            this.classList.add('animating');

            setTimeout(function() { self.classList.remove('animating'); }, 350);

        document.addEventListener('click', function(e) {

        document.querySelector('#healthButton > .health-decoration:first-child').addEventListener('click', function() {
            var btn = this;
            btn.classList.remove('health-fetch-error');
            var expandedCard = document.querySelector('.service-card.expanded');
            if (expandedCard) {
                var ec = expandedCard.querySelector('.card-expanded-content');
                if (ec) ec.innerHTML = '<div class="expand-loader"><div class="spinner"></div></div>';
                var cardPort = expandedCard.getAttribute('data-port');
                var cardName = expandedCard.querySelector('.card-name').textContent;
                var cardHash = expandedCard.getAttribute('data-hash');
                var cardProtected = expandedCard.getAttribute('data-protected') === 'true';
                if (cardPort) {
                    var hxhr = new XMLHttpRequest();
                    hxhr.open('GET', 'http://127.0.0.1:' + cardPort + '/api/health', true);
                    hxhr.timeout = 3000;
                    hxhr.onload = function() {
                        if (hxhr.status === 200) {
                            try {
                                var hd = JSON.parse(hxhr.responseText);
                                expandedCard.classList.remove('service-card-unhealthy');
                                if (cardHash) removeBrokenClient(cardHash);
                                updateCardButtonLabels(expandedCard);
                                var exhr = new XMLHttpRequest();
                                exhr.open('POST', '/api/service/endpoints', true);
                                exhr.setRequestHeader('Content-Type', 'application/json');
                                exhr.timeout = 3000;
                                exhr.onload = function() {
                                    var eps = [];
                                    if (exhr.status === 200) {
                                        try { var ed = JSON.parse(exhr.responseText); eps = ed.endpoints || []; } catch(e) {}
                                    }
                                    populateExpandedContent(expandedCard, hd, eps);
                                };
                                exhr.onerror = function() { populateExpandedContent(expandedCard, hd, []); };
                                exhr.ontimeout = function() { populateExpandedContent(expandedCard, hd, []); };
                                exhr.send(JSON.stringify({name: cardName}));
                                return;
                            } catch(e) {}
                        }
                        markExpandedCardUnhealthy();
                    };
                    hxhr.onerror = markExpandedCardUnhealthy;
                    hxhr.ontimeout = markExpandedCardUnhealthy;
                    hxhr.send();
                } else {
                    showExpandError(expandedCard, cardName);
                }
                function markExpandedCardUnhealthy() {
                    expandedCard.classList.add('service-card-unhealthy');
                    if (cardHash) {
                        var metaVals = expandedCard.querySelectorAll('.card-meta-value');
                        addBrokenClient({
                            hash: cardHash,
                            name: cardName,
                            port: cardPort,
                            starting_script: expandedCard.getAttribute('data-starting-script'),
                            bind_address: metaVals[0] ? metaVals[0].textContent : '',
                            hostname: metaVals[1] ? metaVals[1].textContent : '',
                            protected: cardProtected
                        });
                    }
                    updateCardButtonLabels(expandedCard);
                    showExpandError(expandedCard, cardName);
                }
            } else {
                var hasSelection = Object.keys(_selectedCardHashes).some(function(h) { return _selectedCardHashes[h]; });
                if (hasSelection) {
                    var content = document.getElementById('content');
                    var loader = document.createElement('div');
                    loader.className = 'content-loader';
                    loader.innerHTML = '<div class="spinner"></div>';
                    content.appendChild(loader);
                    var selectedHashes = Object.keys(_selectedCardHashes).filter(function(h) { return _selectedCardHashes[h]; });
                    var pending = selectedHashes.length;
                    selectedHashes.forEach(function(sHash) {
                        fetch('/api/services/healthcheck', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({hash: sHash}) })
                            .then(function(r) { return r.json(); })
                            .then(function(d) {
                                if (!d.healthy) {
                                    var card = document.querySelector('.service-card[data-hash="' + sHash + '"]');
                                    if (card) {
                                        card.classList.add('service-card-unhealthy');
                                        updateCardButtonLabels(card);
                                        var metaVals = card.querySelectorAll('.card-meta-value');
                                        addBrokenClient({
                                            hash: sHash,
                                            name: card.querySelector('.card-name').textContent,
                                            port: card.getAttribute('data-port'),
                                            starting_script: card.getAttribute('data-starting-script'),
                                            bind_address: metaVals[0] ? metaVals[0].textContent : '',
                                            hostname: metaVals[1] ? metaVals[1].textContent : '',
                                            protected: card.getAttribute('data-protected') === 'true'
                                        });
                                    }
                                } else {
                                    var card = document.querySelector('.service-card[data-hash="' + sHash + '"]');
                                    if (card) {
                                        card.classList.remove('service-card-unhealthy');
                                        removeBrokenClient(sHash);
                                        updateCardButtonLabels(card);
                                    }
                                }
                                if (--pending <= 0) {
                                    var l = content.querySelector('.content-loader');
                                    if (l) l.remove();
                                    _clearCheckboxSelection();
                                }
                            })
                            .catch(function() {
                                if (--pending <= 0) {
                                    var l = content.querySelector('.content-loader');
                                    if (l) l.remove();
                                    _clearCheckboxSelection();
                                }
                            });
                    });
                } else {
                var content = document.getElementById('content');
                var loader = document.createElement('div');
                loader.className = 'content-loader';
                loader.innerHTML = '<div class="spinner"></div>';
                content.appendChild(loader);
                fetch('/api/services/healthcheck', { method: 'POST' })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        applyHealthUpdates(d.unhealthy);
                        var l = content.querySelector('.content-loader');
                        if (l) l.remove();
                    })
                    .catch(function() {
                        var l = content.querySelector('.content-loader');
                        if (l) l.remove();
                        btn.classList.add('health-fetch-error');
                    });
            }
        }
        });

            fetch('/api/shutdown', { method: 'POST' }).catch(function() {});
        });

        document.querySelector('.broken-forget-btn').addEventListener('click', function() {
            var toForget = brokenClients.slice();
            if (toForget.length === 0) return;
            toForget.forEach(function(bc) { forgottenHashes[bc.hash] = true; });
            var content = document.getElementById('content');
            var loader = document.createElement('div');
            loader.className = 'content-loader';
            loader.innerHTML = '<div class="spinner"></div>';
            content.appendChild(loader);
            var expandedCard = content.querySelector('.service-card.expanded');
            if (expandedCard) collapseExpandedCard(expandedCard, content, true);
            var pendingTerm = toForget.length;
            var terminatedHashes = {};
            toForget.forEach(function(bc) { terminatedHashes[bc.hash] = true; });
            function tryFinish() {
                if (pendingTerm > 0) return;
                brokenClients = [];
                fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                    enrichClientsWithHashes(d.clients).then(function(clients) {
                        buildCards(clients.filter(function(c) { return !terminatedHashes[c.hash]; }), false);
                    });
                }).catch(function() {});
            }
            toForget.forEach(function(bc) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/broken/forget', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (--pendingTerm <= 0) tryFinish();
                };
                xhr.send(JSON.stringify({ hash: bc.hash }));
            });
        });

        document.querySelector('.broken-restart-btn').addEventListener('click', function() {
            if (this.disabled) return;
            var toRestart = brokenClients.slice();
            if (toRestart.length === 0) return;
            toRestart.forEach(function(bc) { forgottenHashes[bc.hash] = true; });
            var content = document.getElementById('content');
            var loader = document.createElement('div');
            loader.className = 'content-loader';
            loader.innerHTML = '<div class="spinner"></div>';
            content.appendChild(loader);
            var expandedCard = content.querySelector('.service-card.expanded');
            if (expandedCard) collapseExpandedCard(expandedCard, content, true);
            var terminatedHashes = {};
            toRestart.forEach(function(bc) { terminatedHashes[bc.hash] = true; });
            var pendingTerm = toRestart.length;
            function tryFinish() {
                if (pendingTerm > 0) return;
                brokenClients = [];
                toRestart.forEach(function(bc) {
                    fetch('/api/broken/restart', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({hash: bc.hash})
                    }).catch(function() {});
                });
                fetch('/api/services').then(function(r) { return r.json(); }).then(function(d) {
                    enrichClientsWithHashes(d.clients).then(function(clients) {
                        buildCards(clients.filter(function(c) { return !terminatedHashes[c.hash]; }), false);
                    });
                }).catch(function() {});
            }
            toRestart.forEach(function(bc) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/broken/forget', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onloadend = function() {
                    if (--pendingTerm <= 0) tryFinish();
                };
                xhr.send(JSON.stringify({ hash: bc.hash }));
            });
        });
